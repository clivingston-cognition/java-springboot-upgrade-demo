<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('TODO Manager')}"></head>
<body>
<header th:replace="~{fragments/layout :: header}"></header>

<div class="container">
    <!-- Success Message -->
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <!-- Stats Bar -->
    <div class="stats-bar">
        <div class="stat-card">
            <div class="stat-value" th:text="${stats['total']}">0</div>
            <div class="stat-label">Total</div>
        </div>
        <div class="stat-card pending">
            <div class="stat-value" th:text="${stats['pending']}">0</div>
            <div class="stat-label">Pending</div>
        </div>
        <div class="stat-card in-progress">
            <div class="stat-value" th:text="${stats['inProgress']}">0</div>
            <div class="stat-label">In Progress</div>
        </div>
        <div class="stat-card completed">
            <div class="stat-value" th:text="${stats['completed']}">0</div>
            <div class="stat-label">Completed</div>
        </div>
        <div class="stat-card overdue">
            <div class="stat-value" th:text="${stats['overdue']}">0</div>
            <div class="stat-label">Overdue</div>
        </div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
        <div class="toolbar-left">
            <form class="search-form" th:action="@{/}" method="get">
                <input type="text" name="search" placeholder="Search todos..."
                       th:value="${search}">
                <button type="submit" class="btn btn-outline btn-sm">Search</button>
            </form>

            <form th:action="@{/}" method="get" style="display:flex;gap:8px;">
                <select name="status" onchange="this.form.submit()">
                    <option value="">All Statuses</option>
                    <option th:each="s : ${statuses}" th:value="${s}" th:text="${s.displayName}"
                            th:selected="${selectedStatus != null and selectedStatus == s}"></option>
                </select>
                <select name="priority" onchange="this.form.submit()">
                    <option value="">All Priorities</option>
                    <option th:each="p : ${priorities}" th:value="${p}" th:text="${p.displayName}"
                            th:selected="${selectedPriority != null and selectedPriority == p}"></option>
                </select>
            </form>
        </div>

        <a th:href="@{/todos/new}" class="btn btn-primary">+ New Todo</a>
    </div>

    <!-- Todo List -->
    <div th:if="${#lists.isEmpty(todos)}" class="empty-state">
        <h3>No todos found</h3>
        <p>Create your first todo to get started!</p>
        <a th:href="@{/todos/new}" class="btn btn-primary">+ Create Todo</a>
    </div>

    <div th:unless="${#lists.isEmpty(todos)}" class="todo-list">
        <div th:each="todo : ${todos}"
             th:class="'todo-card priority-' + ${todo.priority} + ' status-' + ${todo.status} + (${todo.overdue} ? ' overdue' : '')">

            <div class="todo-content">
                <div class="todo-title">
                    <a th:href="@{/todos/{id}(id=${todo.id})}" th:text="${todo.title}"
                       style="color:inherit;text-decoration:none;">Title</a>
                </div>
                <div th:if="${todo.description}" class="todo-description"
                     th:text="${#strings.abbreviate(todo.description, 120)}">Description</div>
                <div class="todo-meta">
                    <span th:class="'badge badge-' + ${#strings.toLowerCase(#strings.replace(todo.status.displayName, ' ', '-'))}"
                          th:text="${todo.status.displayName}">Status</span>
                    <span th:class="'badge badge-' + ${#strings.toLowerCase(todo.priority.displayName)}"
                          th:text="${todo.priority.displayName}">Priority</span>
                    <span th:if="${todo.dueDate}"
                          th:class="'todo-date' + (${todo.overdue} ? ' overdue' : '')"
                          th:text="'Due: ' + ${todo.dueDate}">Due Date</span>
                    <span class="todo-date" th:text="'Created: ' + ${todo.createdAt}">Created</span>
                </div>
            </div>

            <div class="todo-actions">
                <form th:action="@{/todos/{id}/toggle(id=${todo.id})}" method="post" style="display:inline;">
                    <button type="submit"
                            th:class="'btn btn-sm ' + (${todo.status.name() == 'COMPLETED'} ? 'btn-outline' : 'btn-success')"
                            th:text="${todo.status.name() == 'COMPLETED'} ? 'Undo' : 'Done'">Toggle</button>
                </form>
                <a th:href="@{/todos/{id}/edit(id=${todo.id})}" class="btn btn-outline btn-sm">Edit</a>
                <form th:action="@{/todos/{id}/delete(id=${todo.id})}" method="post" style="display:inline;"
                      onsubmit="return confirm('Are you sure you want to delete this todo?');">
                    <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                </form>
            </div>
        </div>
    </div>

    <!-- Pagination -->
    <div th:if="${totalPages > 1}" class="pagination">
        <a th:if="${currentPage > 0}"
           th:href="@{/(page=${currentPage - 1}, size=10, sortBy=${sortBy}, direction=${direction}, status=${selectedStatus}, priority=${selectedPriority})}"
           class="btn btn-outline btn-sm">&laquo; Previous</a>
        <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
            <a th:if="${i != currentPage}"
               th:href="@{/(page=${i}, size=10, sortBy=${sortBy}, direction=${direction}, status=${selectedStatus}, priority=${selectedPriority})}"
               th:text="${i + 1}">1</a>
            <span th:if="${i == currentPage}" class="active" th:text="${i + 1}">1</span>
        </span>
        <a th:if="${currentPage < totalPages - 1}"
           th:href="@{/(page=${currentPage + 1}, size=10, sortBy=${sortBy}, direction=${direction}, status=${selectedStatus}, priority=${selectedPriority})}"
           class="btn btn-outline btn-sm">Next &raquo;</a>
    </div>
</div>
</body>
</html>
